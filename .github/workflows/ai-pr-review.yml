name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  models: read  # Required for GitHub Models API access

jobs:
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the diff, cap at 6000 chars to stay within model context limits
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} | head -c 6000)
          echo "diff<<DIFF_EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "DIFF_EOF" >> "$GITHUB_OUTPUT"

      - name: Run AI review via GitHub Models
        id: ai-review
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        with:
          script: |
            const diff = process.env.PR_DIFF || '';
            const pr_title = process.env.PR_TITLE || '';
            const pr_body = process.env.PR_BODY || '';

            const systemPrompt = `You are an expert .NET 10 code reviewer for a Clean Architecture service.

            Repository conventions:
            - Uses Result<T> for error handling — no throwing for expected failures
            - Custom CQRS: ISender.SendAsync(), IRequestHandler with HandleAsync() (NOT MediatR)
            - Minimal APIs only (no ControllerBase or [ApiController])
            - Central package management (Directory.Packages.props)
            - TreatWarningsAsErrors=true — all warnings are errors
            - Tests: unit tests call HandleAsync directly; integration tests use Testcontainers

            Review for:
            1. Correctness and logic bugs
            2. Violations of the repository conventions above
            3. Security issues (injection, secrets, auth bypass)
            4. Missing error handling (throwing instead of Result<T>)
            5. Missing tests for new functionality

            Be concise. Only flag real issues. Do not comment on style or formatting.
            Format your response as markdown.`;

            const userMessage = `PR: ${pr_title}\n\n${pr_body ? 'Description: ' + pr_body + '\n\n' : ''}Diff:\n\`\`\`diff\n${diff}\n\`\`\``;

            // Call GitHub Models API (OpenAI-compatible)
            const response = await fetch('https://models.inference.ai.azure.com/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`
              },
              body: JSON.stringify({
                model: 'claude-3-7-sonnet',
                messages: [
                  { role: 'user', content: `${systemPrompt}\n\n${userMessage}` }
                ],
                max_tokens: 1000
              })
            });

            if (!response.ok) {
              console.log(`GitHub Models API returned ${response.status} — skipping AI review`);
              core.setOutput('review', '');
              return;
            }

            const data = await response.json();
            const choices = data.choices;
            const review = (choices && choices[0] && choices[0].message && choices[0].message.content) ? choices[0].message.content : '';
            core.setOutput('review', review);

      - name: Post review comment
        if: steps.ai-review.outputs.review != ''
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          AI_REVIEW: ${{ steps.ai-review.outputs.review }}
        with:
          script: |
            const review = process.env.AI_REVIEW || '';
            if (!review || review.trim() === '') return;

            const body = `## 🤖 AI Code Review\n\n${review}\n\n---\n*Powered by [GitHub Models](https://github.com/marketplace/models) · claude-3-7-sonnet · This is an automated review — always apply human judgement.*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
