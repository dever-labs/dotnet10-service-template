# docker-compose.override.yml — local development overrides
# This file is not committed with secrets; copy .env.example to .env for local secrets
services:
  api:
    build:
      target: build
      args:
        VERSION: 0.0.1-local
    volumes:
      - .:/src:ro
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_USE_POLLING_FILE_WATCHER=true

  adminer:
    image: adminer:latest
    ports:
      - "8181:8080"
    depends_on:
      - postgres
    restart: unless-stopped
