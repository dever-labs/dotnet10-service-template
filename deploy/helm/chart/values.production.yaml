replicaCount: 3

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20

env:
  ASPNETCORE_ENVIRONMENT: Production

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: service-template.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: service-template-tls
      hosts:
        - service-template.example.com
