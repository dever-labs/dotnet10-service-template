apiVersion: v2
name: service-template
description: A production-ready .NET 10 service Helm chart
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - dotnet
  - api
  - service
maintainers:
  - name: Platform Team
    email: platform@your-org.com

dependencies:
  # OTel Collector deployed alongside the app — receives OTLP from the service
  # and forwards to your observability backend (Jaeger, Grafana, Datadog, etc.)
  # Disable with: helm install --set opentelemetry-collector.enabled=false
  # when a cluster-wide collector already exists.
  - name: opentelemetry-collector
    version: "0.108.0"
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    condition: opentelemetry-collector.enabled
