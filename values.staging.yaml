# Staging environment overrides.
#
# Stored at the repo root — outside charts/ so it is NOT packaged into the Helm chart.
# Apply via your CI/CD pipeline:
#   helm upgrade --install service-template charts \
#     -f charts/values.yaml \
#     -f values.staging.yaml \
#     --set image.tag=<version>
#
# Production values are NOT stored in this repo — managed by the GitOps deployment repo.

replicaCount: 1

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

env:
  ASPNETCORE_ENVIRONMENT: Staging

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: service-template.staging.example.com
      paths:
        - path: /
          pathType: Prefix
